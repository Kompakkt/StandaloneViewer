name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Get release metadata
        id: meta
        run: |
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}
          name: ${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}
          files: |
            kompakkt-standalone.min.js
            kompakkt-standalone.min.js.map
